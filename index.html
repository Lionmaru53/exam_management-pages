<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>定期テスト得点入力 認証画面</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; background: #f5f7fa; margin: 0; }
    .card { background: #fff; border-radius: 12px; padding: 32px; text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1); max-width: 320px; width: 90%; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0;
               border-top-color: #007bff; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input { width: 100%; padding: 8px; border: 1px solid #ccc;
            border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 10px; width: 100%; padding: 10px;
             background: #06c755; color: #fff; border: none;
             border-radius: 6px; cursor: pointer; font-size: 1em; }
  </style>
</head>
<body>
  <div class="card" id="content">
    <div class="spinner" id="spinner"></div>
    <p id="msg">認証中...</p>
  </div>

  <script>
  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = msg;
  }

  function showDevForm() {
    document.getElementById('content').innerHTML = `
      <p style="font-weight:bold; margin-bottom:8px;">開発用テストモード</p>
      <p style="font-size:0.85em; color:#888; margin-bottom:16px;">
        line_user_id を直接入力してテストできます
      </p>
      <input id="uid" type="text" placeholder="Uxxxxxxxxxxxxxxxxx">
      <button onclick="goWithUserId()">表示する</button>`;
  }

  function goWithUserId(userId) {
    userId = userId || (document.getElementById('uid') || {}).value || '';
    userId = userId.trim();
    if (!userId) { alert('userId を入力してください'); return; }
    window.location.href = GAS_URL + '?userId=' + encodeURIComponent(userId);
  }

  window.onload = async function() {
    try {
      // withLoginOnExternalBrowser: true により、LIFF URL 経由の外部ブラウザアクセス時は
      // liff.init() 内で自動的に LINE ログインへリダイレクトされる。
      // GitHub Pages を直打ちした場合は LIFF コンテキストがないため自動ログインは走らない。
      await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });

      if (!liff.isLoggedIn()) {
        if (liff.isInClient()) {
          // LINE アプリ内だが未ログイン（念のため）
          liff.login();
          return;
        }
        // 外部ブラウザ + 未ログイン = LIFF URL 経由でなく GitHub Pages 直打ち → 開発用フォーム
        showDevForm();
        return;
      }

      // ログイン済み（LINE アプリ内 / LIFF URL 経由の外部ブラウザ、どちらも共通）
      document.getElementById('msg').textContent = 'データを読み込み中...';
      var profile = await liff.getProfile();
      window.location.href = GAS_URL + '?userId=' + encodeURIComponent(profile.userId);

    } catch (err) {
      showError('エラー: ' + err.message);
    }
  };
  </script>
</body>
</html>
